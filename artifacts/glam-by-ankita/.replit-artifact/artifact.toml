kind = "web"
previewPath = "/"
title = "The Glam by Ankita"
version = "1.0.0"
id = "artifacts/glam-by-ankita"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24394

[services.development]
run = "pnpm --filter @workspace/glam-by-ankita run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/glam-by-ankita", "run", "build" ]
publicDir = "artifacts/glam-by-ankita/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24394"
BASE_PATH = "/"
